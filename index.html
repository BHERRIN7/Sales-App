<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Intelligence | Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* --- STYLING & ANIMATIONS --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0d0a;--surface:#1a1713;--surface2:#231f19;--border:#2e2820;
  --amber:#e8a020;--amber-l:#f5c060;--amber-d:#7a5010;--amber-dim:rgba(232,160,32,0.15);
  --cream:#f0e8d8;--muted:#8a7d6a;--green:#4caf7d;--red:#e05555;--blue:#6090c8;
}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;line-height:1.5;padding:20px}

/* UI Elements */
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:30px;border-bottom:1px solid var(--border);padding-bottom:20px}
h1{font-family:'Bebas Neue',cursive;font-size:3rem;letter-spacing:2px;color:var(--amber)}
.tabs{display:flex;gap:10px;margin-bottom:25px;overflow-x:auto}
.tab-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:10px 20px;cursor:pointer;font-weight:500;transition:0.2s}
.tab-btn.active{background:var(--amber);color:var(--bg);border-color:var(--amber)}
.panel{display:none}.panel.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);padding:20px;position:relative}
.card-title{font-family:'Bebas Neue',cursive;font-size:1.4rem;margin-bottom:15px;display:flex;justify-content:space-between}

/* Tables & KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:25px}
.kpi{background:var(--surface2);padding:15px;border-left:3px solid var(--amber)}
.kpi .lbl{font-size:0.7rem;color:var(--muted);text-transform:uppercase}
.kpi .val{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
th{text-align:left;padding:10px;color:var(--muted);border-bottom:1px solid var(--border);font-size:0.7rem;text-transform:uppercase}
td{padding:10px;border-bottom:1px solid var(--border)}

/* New Features CSS */
.search-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; }
.export-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 4px 8px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
.export-btn:hover { color: var(--amber); border-color: var(--amber); }
@keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
.alert-pulse { color: var(--red); animation: pulse-red 2s infinite; font-weight: bold; }

#loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
.spinner { border: 4px solid var(--surface2); border-top: 4px solid var(--amber); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="font-family:'Bebas Neue'; font-size: 1.5rem; letter-spacing: 2px;">Syncing with GitHub...</div>
</div>

<header>
  <div>
    <h1>Sales Intelligence</h1>
    <p style="color:var(--muted)">Connected to: <span style="color:var(--amber)">BHERRIN7/Sales-App</span></p>
  </div>
  <div style="font-family:'DM Mono'; font-size: 0.8rem; color: var(--muted);" id="sync-time"></div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('ov')">Overview</button>
  <button class="tab-btn" onclick="showTab('items')">Top Items</button>
  <button class="tab-btn" onclick="showTab('inv')">Inventory</button>
</div>

<div class="panel active" id="ov">
  <div class="kpi-row" id="kpi-container"></div>
  <div class="grid">
    <div class="card"><div class="card-title">Category Revenue</div><canvas id="c-cat"></canvas></div>
    <div class="card"><div class="card-title">Beverage vs Food</div><canvas id="c-split"></canvas></div>
  </div>
</div>

<div class="panel" id="items">
  <div class="card">
    <div class="card-title">
        Product Performance
        <button class="export-btn" onclick="exportCSV('t-items', 'Product_Sales.csv')">Export CSV</button>
    </div>
    <input type="text" id="item-search" class="search-input" placeholder="Filter items by name...">
    <table id="t-items"></table>
  </div>
</div>

<div class="panel" id="inv">
    <div class="kpi-row" id="kpi-inv-container"></div>
    <div class="card">
        <div class="card-title">Critical Stock Alerts</div>
        <table id="t-inv-alerts"></table>
    </div>
</div>

<script>
const RAW_URL = "https://raw.githubusercontent.com/BHERRIN7/Sales-App/refs/heads/main/reports/latest_data.json";

async function loadData() {
    try {
        const response = await fetch(RAW_URL);
        if (!response.ok) throw new Error("Failed to fetch data");
        const D = await response.json();
        
        document.getElementById('loader').style.display = 'none';
        document.getElementById('sync-time').innerText = "Last Sync: " + new Date().toLocaleTimeString();
        
        renderOverview(D);
        renderTopItems(D);
        renderInventory(D);
        
    } catch (err) {
        document.querySelector('#loader div:last-child').innerText = "Connection Error. Check GitHub URL.";
        console.error(err);
    }
}

function renderOverview(D) {
    const kpis = [
        {lbl: 'Net Sales', val: '$' + (D.kpis.net_sales / 1000000).toFixed(2) + 'M'},
        {lbl: 'Total Items', val: (D.kpis.items_sold / 1000).toFixed(1) + 'K'},
        {lbl: 'Avg Price', val: '$' + D.kpis.avg_price.toFixed(2)}
    ];
    document.getElementById('kpi-container').innerHTML = kpis.map(k => `<div class="kpi"><div class="lbl">${k.lbl}</div><div class="val">${k.val}</div></div>`).join('');

    // Charts
    new Chart(document.getElementById('c-cat'), {
        type: 'bar',
        data: {
            labels: D.category_performance.map(c => c.name),
            datasets: [{ data: D.category_performance.map(c => c.revenue), backgroundColor: '#e8a020' }]
        },
        options: { indexAxis: 'y', plugins: { legend: { display: false } } }
    });
    
    new Chart(document.getElementById('c-split'), {
        type: 'doughnut',
        data: {
            labels: ['Bev', 'Food'],
            datasets: [{ data: [D.kpis.bev_net, D.kpis.food_net], backgroundColor: ['#e8a020', '#2e2820'] }]
        }
    });
}

function renderTopItems(D) {
    const table = document.getElementById('t-items');
    let html = `<thead><tr><th>Rank</th><th>Name</th><th>Revenue</th></tr></thead><tbody>`;
    D.top_items.forEach(item => {
        html += `<tr><td>${item.rank}</td><td>${item.name}</td><td class="mono">$${item.revenue.toLocaleString()}</td></tr>`;
    });
    table.innerHTML = html + `</tbody>`;

    // Live Search Logic
    document.getElementById('item-search').addEventListener('keyup', function() {
        const term = this.value.toLowerCase();
        const rows = table.querySelectorAll('tbody tr');
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(term) ? '' : 'none');
    });
}

function renderInventory(D) {
    const invKpis = [
        {lbl: 'Total Value', val: '$' + (D.inventory.on_hand_value / 1000).toFixed(1) + 'K'},
        {lbl: 'Under Par', val: D.inventory.under_par_count, class: 'alert-pulse'}
    ];
    document.getElementById('kpi-inv-container').innerHTML = invKpis.map(k => `
        <div class="kpi"><div class="lbl">${k.lbl}</div><div class="val ${k.class || ''}">${k.val}</div></div>
    `).join('');

    const alertTable = document.getElementById('t-inv-alerts');
    let html = `<thead><tr><th>Item</th><th>Stock</th><th>Par</th></tr></thead><tbody>`;
    D.inventory.under_par_items.forEach(item => {
        html += `<tr><td>${item.name}</td><td style="color:var(--red)">${item.stock}</td><td>${item.par}</td></tr>`;
    });
    alertTable.innerHTML = html + `</tbody>`;
}

function showTab(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}

function exportCSV(tableId, filename) {
    let csv = [];
    const rows = document.querySelectorAll(`#${tableId} tr`);
    rows.forEach(row => {
        const cols = row.querySelectorAll('td, th');
        const data = Array.from(cols).map(c => `"${c.innerText}"`).join(',');
        csv.push(data);
    });
    const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
}

loadData();
</script>
</body>
</html>
